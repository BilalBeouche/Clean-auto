<div class="container mt-4">
    <div class="d-flex justify-content-center gap-4">
        @for(prestation of prestations; track prestation.id){

        <div class="card d-flex flex-column h-100" style="width: 18rem; min-height: 300px;"
           >

            <div class="card-body d-flex flex-column">

                <h5 class="card-title text-center">
                    {{ prestation.namePrestation }}
                </h5>

                <p class="card-text flex-grow-1 text-center">
                    {{ prestation.description }}
                </p>

            @if(!authService.isLoggedIn()){

                <a routerLink="/login" class="btn btn-primary mt-auto">
                    Connectez-vous pour réserver
                </a>
            } @else{
                  <a routerLink="/prestations" class="btn btn-primary mt-auto">
                    Choisir
                </a>

            }

            </div>

        </div>



        }
    </div>
